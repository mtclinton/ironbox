name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone rust-extensions
        run: git clone --depth 1 https://github.com/containerd/rust-extensions.git ../rust-extensions

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Build
        run: cargo build --release

      - name: Clippy
        run: cargo clippy -- -D warnings -A dead_code

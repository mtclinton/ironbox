name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone rust-extensions (pinned to shim v0.8.0)
        run: git clone https://github.com/containerd/rust-extensions.git ../rust-extensions && cd ../rust-extensions && git checkout 220d6d6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Build
        run: cargo build --release

      - name: Clippy
        run: cargo clippy -- -D warnings -A dead_code
